<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Non Binary Fairy's Pizza Surfing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <script>
        // Global context and constants
        const BASE_URL = 'https://raw.githubusercontent.com/conblau97/NBFPS/main/';
        
        const ASSETS = {
            images: {
                avanzar: BASE_URL + 'avanzar.gif',
                explosion: BASE_URL + 'explosion.gif',
                rock: BASE_URL + 'rock.png',
                powerup: BASE_URL + 'powerup.png',
                trophy: BASE_URL + 'trophy.png',
                hud: BASE_URL + 'HUDcontainer.png',
                heart: BASE_URL + 'heart.png',
                logo: BASE_URL + 'LOGO.png',
                agua: BASE_URL + 'agua.gif',
                splatter: BASE_URL + 'splatter.gif',
                alien: BASE_URL + 'alien.gif',
                movimiento: BASE_URL + 'movimiento.gif',
                clouds: BASE_URL + 'clouds.gif',
                sol: BASE_URL + 'sol.gif',
                choque: BASE_URL + 'choque.png',
                saltar: BASE_URL + 'saltar.gif',
                bubble: BASE_URL + 'bubble.gif'
            },
            audio: {
                powerup: new Audio(BASE_URL + 'powerUp.wav'),
                collision: new Audio(BASE_URL + 'collision.mp3'),
                explosion: new Audio(BASE_URL + 'explosion.wav'),
                jump: new Audio(BASE_URL + 'jump.wav'),
                soundtrack: new Audio(BASE_URL + 'soundtrack.mp3')
            }
        };

        // Pre-configure Audio
        ASSETS.audio.soundtrack.loop = true;
        ASSETS.audio.soundtrack.volume = 0.5;

        // URL del Webhook de Google Sheets
        const GOOGLE_SHEETS_WEBHOOK = "https://script.google.com/macros/s/AKfycby61MM3KSLCV60iMzwKWeTxN9ZCxwvnb7h4kSOxi3NENc6s1m4IU11X4Hb9EJxiCNwf/exec";

        // --- GAME ENGINE ---
        
        const STATE = {
            status: 'SPLASH', // SPLASH, PLAYING, GAMEOVER, LEADERBOARD
            score: 0,
            lives: 3,
            lane: 1, // 0: Top, 1: Mid, 2: Bot
            isJumping: false,
            jumpTimer: 0,
            hasShield: false,
            shieldTimer: 0,
            isInvincible: false,
            invincibilityTimer: 0,
            speedMultiplier: 1.0,
            baseSpeed: 40, // % del contenedor por segundo
            tickScoreCounter: 0,
            obstacles: [], // { id, type, lane, x, element, width, realWidthSet, scored, disabled }
            particles: [],
            distanceSinceLastSpawn: 0, 
            lastColumnRockCount: 0, 
            consecutiveRockColumns: 0,
            lastColumnAlienCount: 0, 
            consecutiveAlienColumns: 0 
        };

        const CONSTANTS = {
            lanesCenterY: [16.666, 50, 83.333], 
            lanesBottomY: [33.333, 66.666, 100], 
            playerX: 10, 
            playerHitWidth: 28, 
            jumpDuration: 1200, 
            shieldDuration: 10000, 
            invincibilityDuration: 3000, 
            baseSpawnDistance: 65, 
            minSpawnDistance: 40 
        };

        // DOM Elements
        const DOM = {
            gameArea: null,
            entitiesArea: null,
            player: null,
            playerImg: null,
            shieldImg: null,
            scoreDisplay: null,
            livesDisplay: null,
            modals: {},
            waterBg: null,
            clouds: null
        };

        let lastTime = 0;
        let animationFrameId;

        window.onload = () => {
            setupDOM();
            setupInput();
            showModal('splash');
            createBackground();
            
            // Start Loop
            requestAnimationFrame(gameLoop);
        };

        function setupDOM() {
            DOM.gameArea = document.getElementById('game-container');
            DOM.entitiesArea = document.getElementById('entities-container');
            DOM.player = document.getElementById('player');
            DOM.playerImg = document.getElementById('player-img');
            DOM.shieldImg = document.getElementById('shield-img');
            DOM.scoreDisplay = document.getElementById('hud-score');
            DOM.livesDisplay = document.getElementById('hud-lives');
            
            DOM.modals.splash = document.getElementById('modal-splash');
            DOM.modals.gameover = document.getElementById('modal-gameover');
            DOM.modals.leaderboard = document.getElementById('modal-leaderboard');
            
            DOM.waterBg = document.getElementById('water-bg');
            DOM.clouds = document.getElementById('clouds-bg');
            
            // Buttons
            document.getElementById('btn-start').onclick = startGame;
            document.getElementById('btn-leaderboard').onclick = () => showModal('leaderboard');
            document.getElementById('btn-close-lb').onclick = () => {
                if(STATE.status === 'GAMEOVER') showModal('gameover');
                else showModal('splash');
            };
            document.getElementById('btn-submit-score').onclick = submitScore;
            document.getElementById('btn-play-again').onclick = startGame;
        }

        function createBackground() {
            DOM.waterBg.style.backgroundImage = `url('${ASSETS.images.agua}')`;
            DOM.clouds.style.backgroundImage = `url('${ASSETS.images.clouds}')`;
        }

        function playSound(sound) {
            try {
                sound.currentTime = 0;
                sound.play().catch(e => console.log("Audio block:", e));
            } catch(e){}
        }

        function startGame() {
            // Reset state
            STATE.status = 'PLAYING';
            STATE.score = 0;
            STATE.lives = 3;
            STATE.lane = 1;
            STATE.isJumping = false;
            STATE.hasShield = false;
            STATE.isInvincible = false;
            STATE.speedMultiplier = 1.0;
            STATE.tickScoreCounter = 0;
            STATE.distanceSinceLastSpawn = CONSTANTS.baseSpawnDistance;
            STATE.lastColumnRockCount = 0;
            STATE.consecutiveRockColumns = 0;
            STATE.lastColumnAlienCount = 0;
            STATE.consecutiveAlienColumns = 0;
            
            // Clear entities
            STATE.obstacles.forEach(obs => obs.element.remove());
            STATE.obstacles = [];
            STATE.particles.forEach(p => p.element.remove());
            STATE.particles = [];

            // Mostrar jugador y resetear sprite a su estado original
            DOM.player.classList.remove('hidden');
            DOM.playerImg.src = ASSETS.images.avanzar;

            // Mostrar HUD
            document.getElementById('hud-wrapper').classList.remove('hidden');

            updatePlayerVisuals();
            updateHUD();
            
            // Hide Modals
            document.querySelectorAll('.modal-overlay').forEach(el => el.classList.add('hidden'));

            // Start Audio
            ASSETS.audio.soundtrack.play().catch(e=>console.log("Auto-play blocked"));
        }

        function handleHit() {
            if (STATE.isInvincible) return;
            if (STATE.hasShield) return;

            STATE.lives--;
            updateHUD();

            if (STATE.lives <= 0) {
                gameOver();
            } else {
                STATE.lane = 1;
                STATE.isInvincible = true;
                STATE.invincibilityTimer = CONSTANTS.invincibilityDuration;
                STATE.speedMultiplier = 1.0; 
                
                STATE.obstacles.forEach(obs => obs.element.remove());
                STATE.obstacles = [];

                updatePlayerVisuals();
            }
        }

        function gameOver() {
            STATE.status = 'GAMEOVER';
            ASSETS.audio.soundtrack.pause();
            document.getElementById('final-score').innerText = String(Math.floor(STATE.score)).padStart(6, '0');
            DOM.player.classList.add('hidden'); 
            showModal('gameover');
        }

        // --- INPUT HANDLING ---
        function setupInput() {
            // Keyboard
            window.addEventListener('keydown', (e) => {
                if (STATE.status !== 'PLAYING') return;
                if (e.repeat) return; 
                
                if (e.key === 'ArrowUp' || e.key === 'w') moveLane(-1);
                if (e.key === 'ArrowDown' || e.key === 's') moveLane(1);
                if (e.key === ' ' || e.key === 'Enter') jump();
            });

            // Touch Gestures (Swipe vs Tap)
            let touchStartX = 0;
            let touchStartY = 0;

            window.addEventListener('touchstart', (e) => {
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
            }, { passive: false });

            // Prevenir scroll nativo que arruina el swipe en mobile
            window.addEventListener('touchmove', (e) => {
                if (STATE.status === 'PLAYING') {
                    e.preventDefault(); 
                }
            }, { passive: false });

            window.addEventListener('touchend', (e) => {
                if (STATE.status !== 'PLAYING') return;
                
                let touchEndX = e.changedTouches[0].clientX;
                let touchEndY = e.changedTouches[0].clientY;
                
                let diffX = touchStartX - touchEndX;
                let diffY = touchStartY - touchEndY;
                
                if (Math.abs(diffY) > 30 && Math.abs(diffY) > Math.abs(diffX)) {
                    if (diffY > 0) moveLane(-1); // Swipe Up
                    else moveLane(1); // Swipe Down
                } else if (Math.abs(diffY) < 20 && Math.abs(diffX) < 20) {
                    jump(); // Tap ligero
                }
            });
        }

        function moveLane(dir) {
            if (STATE.isJumping) return;
            const newLane = STATE.lane + dir;
            if (newLane >= 0 && newLane <= 2) {
                STATE.lane = newLane;
                DOM.playerImg.src = ASSETS.images.movimiento + "?t=" + Date.now();
                setTimeout(() => {
                    if (!STATE.isJumping && STATE.status === 'PLAYING') {
                        DOM.playerImg.src = ASSETS.images.avanzar;
                    }
                }, 300);
                updatePlayerVisuals();
            }
        }

        function jump() {
            if (STATE.isJumping) return;
            STATE.isJumping = true;
            STATE.jumpTimer = CONSTANTS.jumpDuration;
            playSound(ASSETS.audio.jump);
            updatePlayerVisuals();
        }

        function updatePlayerVisuals() {
            const yPos = CONSTANTS.lanesCenterY[STATE.lane];
            DOM.player.style.top = `${yPos}%`;
            DOM.player.style.zIndex = STATE.lane * 10 + 10;
            
            const spriteWrapper = document.getElementById('player-sprite-wrapper');

            if (STATE.isJumping) {
                DOM.playerImg.src = ASSETS.images.saltar;
                spriteWrapper.style.transform = `translateY(-130%) scale(1.15)`; 
                DOM.player.style.zIndex = STATE.lane * 10 + 15; 
            } else {
                if(DOM.playerImg.src.indexOf(ASSETS.images.saltar) !== -1) {
                   DOM.playerImg.src = ASSETS.images.avanzar;
                }
                spriteWrapper.style.transform = `translateY(0) scale(1)`;
            }

            if (STATE.hasShield) {
                DOM.shieldImg.src = ASSETS.images.bubble;
                DOM.shieldImg.classList.remove('hidden');
            } else {
                DOM.shieldImg.classList.add('hidden');
            }

            if (STATE.isInvincible) {
                DOM.player.classList.add('opacity-50', 'animate-pulse');
            } else {
                DOM.player.classList.remove('opacity-50', 'animate-pulse');
            }
        }

        function updateHUD() {
            DOM.scoreDisplay.innerText = String(Math.floor(STATE.score)).padStart(6, '0');
            
            DOM.livesDisplay.innerHTML = '';
            for(let i=0; i<3; i++) {
                const heart = document.createElement('img');
                heart.src = ASSETS.images.heart;
                heart.className = `w-3 h-3 md:w-4 md:h-4 object-contain ${i >= STATE.lives ? 'grayscale opacity-50' : ''}`;
                DOM.livesDisplay.appendChild(heart);
            }
        }

        // --- GAME LOOP ---
        function gameLoop(timestamp) {
            if (!lastTime) lastTime = timestamp;
            const dt = timestamp - lastTime;
            lastTime = timestamp;

            if (STATE.status === 'PLAYING') {
                updateGame(dt);
            }

            const scrollSpeed = STATE.status === 'PLAYING' ? (0.1 * STATE.speedMultiplier) : 0.02;
            let currentBgPos = parseFloat(DOM.waterBg.style.backgroundPositionX || 0);
            DOM.waterBg.style.backgroundPositionX = `${currentBgPos - scrollSpeed}%`;
            
            let currentCloudsPos = parseFloat(DOM.clouds.style.backgroundPositionX || 0);
            DOM.clouds.style.backgroundPositionX = `${currentCloudsPos - (scrollSpeed * 0.3)}%`;

            requestAnimationFrame(gameLoop);
        }

        function updateGame(dt) {
            STATE.tickScoreCounter += dt;
            if (STATE.tickScoreCounter >= 100) { 
                STATE.score += 1;
                STATE.tickScoreCounter = 0;
                updateHUD();
                
                if (STATE.score > 0 && STATE.score % 500 === 0) {
                    STATE.speedMultiplier += 0.1;
                }
            }

            if (STATE.isJumping) {
                STATE.jumpTimer -= dt;
                if (STATE.jumpTimer <= 0) {
                    STATE.isJumping = false;
                    updatePlayerVisuals();
                }
            }

            if (STATE.hasShield) {
                STATE.shieldTimer -= dt;
                if (STATE.shieldTimer <= 0) {
                    STATE.hasShield = false;
                    updatePlayerVisuals();
                }
            }

            if (STATE.isInvincible) {
                STATE.invincibilityTimer -= dt;
                if (STATE.invincibilityTimer <= 0) {
                    STATE.isInvincible = false;
                    updatePlayerVisuals();
                }
            }

            const moveAmt = (STATE.baseSpeed * STATE.speedMultiplier * dt) / 1000;
            STATE.distanceSinceLastSpawn += moveAmt;

            let currentSpawnDist = Math.max(CONSTANTS.minSpawnDistance, CONSTANTS.baseSpawnDistance - (STATE.speedMultiplier * 5));

            if (STATE.distanceSinceLastSpawn >= currentSpawnDist) {
                spawnColumn();
                STATE.distanceSinceLastSpawn = 0;
            }

            moveAndCheckObstacles(dt, moveAmt);
            cleanupParticles(dt);
        }

        function spawnColumn() {
            let numObs = Math.random() > 0.6 ? 2 : 1; 

            // Reglas de Bloqueo de Rocas
            let maxRocksAllowed = 2;
            if (STATE.consecutiveRockColumns >= 2) maxRocksAllowed = 0; 
            else if (STATE.lastColumnRockCount === 2) maxRocksAllowed = 0; 
            else if (STATE.lastColumnRockCount >= 1) maxRocksAllowed = 1; 

            // Reglas de Bloqueo de Aliens
            let maxAliensAllowed = 2;
            if (STATE.consecutiveAlienColumns >= 2) maxAliensAllowed = 0;
            else if (STATE.lastColumnAlienCount === 2) maxAliensAllowed = 0;
            else if (STATE.lastColumnAlienCount >= 1) maxAliensAllowed = 1;

            let currentRockCount = 0;
            let currentAlienCount = 0;

            let availableLanes = [0, 1, 2];
            availableLanes.sort(() => 0.5 - Math.random());

            for (let i = 0; i < numObs; i++) {
                const lane = availableLanes[i];
                let type = 'rock';

                let rand = Math.random();
                if (rand < 0.015) { 
                    type = 'powerup'; 
                } else if (rand < 0.45) {
                    if (currentAlienCount < maxAliensAllowed) { type = 'alien'; currentAlienCount++; }
                    else if (currentRockCount < maxRocksAllowed) { type = 'rock'; currentRockCount++; }
                    else { type = 'powerup'; }
                } else {
                    if (currentRockCount < maxRocksAllowed) { type = 'rock'; currentRockCount++; }
                    else if (currentAlienCount < maxAliensAllowed) { type = 'alien'; currentAlienCount++; }
                    else { type = 'powerup'; }
                }

                spawnEntity(type, lane);
            }
            
            // Actualizar trackers
            if (currentRockCount > 0) STATE.consecutiveRockColumns++;
            else STATE.consecutiveRockColumns = 0;
            STATE.lastColumnRockCount = currentRockCount;

            if (currentAlienCount > 0) STATE.consecutiveAlienColumns++;
            else STATE.consecutiveAlienColumns = 0;
            STATE.lastColumnAlienCount = currentAlienCount;
        }

        function spawnEntity(type, lane) {
            const el = document.createElement('img');
            
            let hitWidth = 12; 
            el.className = `absolute object-contain transition-none`;
            el.style.left = '100%';
            
            if (type === 'rock') {
                el.src = ASSETS.images.rock;
                el.style.height = '45%'; 
                el.style.top = `${CONSTANTS.lanesBottomY[lane]}%`;
                el.style.transform = `translateY(-100%)`; 
                hitWidth = 18;
            } else if (type === 'alien') {
                el.src = ASSETS.images.alien;
                el.style.height = '13.333%'; 
                el.style.top = `${CONSTANTS.lanesCenterY[lane]}%`;
                el.style.transform = `translateY(-50%)`; 
                hitWidth = 6;
            } else if (type === 'powerup') {
                el.src = ASSETS.images.powerup;
                el.style.height = '10%'; 
                el.style.top = `${CONSTANTS.lanesCenterY[lane]}%`;
                el.style.transform = `translateY(-50%)`; 
                el.style.filter = `drop-shadow(0 0 5px yellow)`; 
                hitWidth = 5;
            }
            
            el.style.zIndex = lane * 10 + 10; 
            DOM.entitiesArea.appendChild(el);
            
            STATE.obstacles.push({
                id: Math.random(),
                type: type,
                lane: lane,
                x: 100, 
                element: el,
                width: hitWidth,
                realWidthSet: false, 
                scored: false, 
                disabled: false 
            });
        }

        function moveAndCheckObstacles(dt, moveAmt) {
            for (let i = STATE.obstacles.length - 1; i >= 0; i--) {
                const obs = STATE.obstacles[i];
                if (!obs) continue; 

                if (!obs.realWidthSet && obs.element.clientWidth > 0) {
                    obs.width = (obs.element.clientWidth / DOM.entitiesArea.clientWidth) * 100;
                    obs.realWidthSet = true;
                }

                obs.x -= moveAmt;
                obs.element.style.left = `${obs.x}%`;

                let isOverlapping = (!obs.disabled && obs.x < CONSTANTS.playerX + CONSTANTS.playerHitWidth && obs.x + obs.width > CONSTANTS.playerX);
                
                if (isOverlapping && obs.lane === STATE.lane) {
                    handleCollision(obs, i);
                }

                if (STATE.status !== 'PLAYING' || STATE.obstacles.length === 0) break;

                if (STATE.obstacles.includes(obs) && obs.x < - (obs.width || 20)) {
                    obs.element.remove();
                    const idx = STATE.obstacles.indexOf(obs);
                    if (idx > -1) STATE.obstacles.splice(idx, 1);
                }
            }
        }

        function createSkyText(text, color) {
            const el = document.createElement('div');
            el.innerHTML = text;
            el.className = 'absolute font-bold text-xl md:text-2xl text-center z-[100] pointer-events-none tracking-widest leading-tight w-full left-0';
            el.style.color = color;
            el.style.top = `35%`; // Comienza más abajo (horizonte)
            el.style.transform = `translateY(-50%)`;
            el.style.textShadow = '2px 2px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000';
            
            // Animación mejorada: Flota hacia arriba 2.5s. La opacidad empieza a bajar a los 1.5s
            el.style.transition = 'top 2.5s cubic-bezier(0.25, 1, 0.5, 1), opacity 1s ease-in 1.5s';
            
            DOM.gameArea.appendChild(el);

            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    el.style.top = `10%`; // Sube hacia las nubes altas
                    el.style.opacity = '0';
                });
            });

            // Dura más tiempo antes de ser destruido
            setTimeout(() => {
                el.remove();
            }, 2500);
        }

        function handleCollision(obs, index) {
            const removeObstacle = () => {
                obs.element.remove();
                const idx = STATE.obstacles.indexOf(obs);
                if (idx > -1) STATE.obstacles.splice(idx, 1);
            };

            if (obs.type === 'powerup') {
                playSound(ASSETS.audio.powerup);
                STATE.score += 50;
                STATE.hasShield = true;
                STATE.shieldTimer = CONSTANTS.shieldDuration;
                updateHUD();
                updatePlayerVisuals();
                createSkyText("BUBBLE SHIELD!<br>+50", "#00E5FF");
                removeObstacle();
                return;
            }

            if (obs.type === 'alien' && STATE.isJumping) {
                if (!obs.scored) {
                    STATE.score += 100;
                    playSound(ASSETS.audio.jump); 
                    updateHUD();
                    
                    obs.scored = true;
                    obs.disabled = true; 
                    createSkyText("ALIEN JUMP!<br>+100", "#FFF110"); 
                }
                return; 
            }

            // Impacto recibido
            if (STATE.hasShield) {
                STATE.score += 100;
                playSound(obs.type === 'rock' ? ASSETS.audio.explosion : ASSETS.audio.collision);
                createSkyText("BOOM!<br>+100", "#FFA500");
                createParticle(obs.type === 'alien' ? 'splatter' : 'explosion', obs.x, obs.lane);
                updateHUD();
                removeObstacle();
            } else if (!STATE.isInvincible) {
                DOM.playerImg.src = ASSETS.images.choque + "?t=" + Date.now();
                setTimeout(() => {
                    if (STATE.status === 'PLAYING' && !STATE.isJumping) {
                        DOM.playerImg.src = ASSETS.images.avanzar;
                    }
                }, 500);
                
                playSound(obs.type === 'rock' ? ASSETS.audio.explosion : ASSETS.audio.collision);
                createSkyText("YOU SUCK!", "#FF0000");

                createParticle(obs.type === 'alien' ? 'splatter' : 'explosion', obs.x, obs.lane);
                handleHit(); 
            }
        }

        function createParticle(type, x, lane) {
            const el = document.createElement('img');
            el.src = ASSETS.images[type] + "?t=" + Date.now();
            el.className = 'absolute object-contain z-50';
            el.style.left = `${x}%`;
            
            if (type === 'explosion') {
                el.style.height = '45%'; 
                el.style.top = `${CONSTANTS.lanesBottomY[lane]}%`;
                el.style.transform = `translateY(-100%)`; 
            } else if (type === 'splatter') {
                el.style.height = '20%'; 
                el.style.top = `${CONSTANTS.lanesCenterY[lane]}%`;
                el.style.transform = `translateY(-100%)`; 
            }
            
            DOM.entitiesArea.appendChild(el);
            
            STATE.particles.push({
                element: el,
                timer: 500 
            });
        }

        function cleanupParticles(dt) {
            for (let i = STATE.particles.length - 1; i >= 0; i--) {
                STATE.particles[i].timer -= dt;
                if (STATE.particles[i].timer <= 0) {
                    STATE.particles[i].element.remove();
                    STATE.particles.splice(i, 1);
                }
            }
        }

        // --- UI & DATA HANDLING ---
        function showModal(id) {
            document.querySelectorAll('.modal-overlay').forEach(el => el.classList.add('hidden'));
            if (DOM.player) DOM.player.classList.add('hidden'); 

            if (id) {
                document.getElementById(`modal-${id}`).classList.remove('hidden');
                
                if (id === 'splash') {
                    const hud = document.getElementById('hud-wrapper');
                    if (hud) hud.classList.add('hidden');
                }

                if (id === 'leaderboard') loadLeaderboard();
            }
        }

        async function submitScore() {
            const nameInput = document.getElementById('input-name').value.trim().toUpperCase();
            if (!nameInput || nameInput.length > 5) {
                alert("Por favor ingresa un nombre de máximo 5 caracteres.");
                return;
            }

            document.getElementById('btn-submit-score').innerText = "SAVING...";
            document.getElementById('btn-submit-score').disabled = true;

            const scoreData = {
                timestamp: new Date().toISOString(),
                username: nameInput,
                score: Math.floor(STATE.score)
            };

            try {
                // Fetch al Google Sheets App Script (POST)
                await fetch(GOOGLE_SHEETS_WEBHOOK, {
                    method: 'POST',
                    body: JSON.stringify(scoreData)
                });
            } catch (e) {
                console.error("Error al guardar score:", e);
                // Fallback local por seguridad si falla el internet
                let localScores = JSON.parse(localStorage.getItem('nbfps_scores') || '[]');
                localScores.push(scoreData);
                localStorage.setItem('nbfps_scores', JSON.stringify(localScores));
            }

            document.getElementById('btn-submit-score').innerText = "SUBMIT";
            document.getElementById('btn-submit-score').disabled = false;
            
            showModal('leaderboard');
        }

        async function loadLeaderboard() {
            const listEl = document.getElementById('leaderboard-list');
            listEl.innerHTML = '<p class="text-center text-xs">LOADING...</p>';

            let top5 = [];

            try {
                // Fetch al Google Sheets App Script (GET)
                const response = await fetch(GOOGLE_SHEETS_WEBHOOK);
                top5 = await response.json();
            } catch (e) {
                console.error("Error cargando leaderboard:", e);
                // Fallback local
                let scores = JSON.parse(localStorage.getItem('nbfps_scores') || '[]');
                scores.sort((a, b) => b.score - a.score);
                top5 = scores.slice(0, 5);
            }

            listEl.innerHTML = '';
            if (top5.length === 0) {
                listEl.innerHTML = '<p class="text-center text-xs text-gray-400">NO SCORES YET</p>';
                return;
            }

            top5.forEach((entry, index) => {
                const row = document.createElement('div');
                row.className = `flex justify-between items-center py-2 text-xs md:text-sm ${index === 0 ? 'text-black font-bold' : 'text-gray-500'}`;
                
                const rankName = document.createElement('div');
                rankName.innerText = `${index + 1}.${entry.username.padEnd(5, ' ')}`;
                
                const scoreBox = document.createElement('div');
                scoreBox.className = "flex items-center gap-2";
                scoreBox.innerText = String(entry.score).padStart(6, '0');
                
                if (index === 0) {
                    const trophy = document.createElement('img');
                    trophy.src = ASSETS.images.trophy;
                    trophy.className = "w-4 h-4 inline";
                    scoreBox.appendChild(trophy);
                }

                row.appendChild(rankName);
                row.appendChild(scoreBox);
                listEl.appendChild(row);
            });
        }
    </script>
